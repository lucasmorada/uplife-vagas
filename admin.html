<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Administrativo | UpLife</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-content">
      <a href="index.html" class="logo logo-image">
       <img src="assets/logo-uplife.png" alt="UpLife" />
      </a>

      <nav class="menu">
        <a href="index.html">Ver site</a>
        <button id="logoutButton" class="btn btn-outline">Sair</button>
      </nav>
    </div>
  </header>

  <main class="admin-page">
    <section class="container">
      <div class="admin-title">
        <div>
          <p class="tag">Painel administrativo</p>
          <h1>Gerenciar vagas</h1>
        </div>

        <button id="newJobButton" class="btn btn-primary">Cadastrar nova vaga</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <span id="totalJobs">0</span>
          <p>Total de vagas</p>
        </div>

        <div class="stat-card">
          <span id="activeJobs">0</span>
          <p>Vagas ativas</p>
        </div>

        <div class="stat-card">
          <span id="inactiveJobs">0</span>
          <p>Vagas inativas</p>
        </div>
      </div>

      <section id="formPanel" class="admin-form-panel hidden">
        <div class="form-header">
          <h2 id="formTitle">Cadastrar vaga</h2>
          <button id="closeFormButton" class="icon-button">Fechar</button>
        </div>

        <form id="jobForm" class="job-form">
          <input type="hidden" id="jobId" />

          <div class="form-grid">
            <div class="form-group">
              <label for="titulo">Título da vaga *</label>
              <input type="text" id="titulo" required />
            </div>

            <div class="form-group">
              <label for="empresa">Empresa</label>
              <input type="text" id="empresa" />
            </div>

            <div class="form-group">
              <label for="localizacao">Localização *</label>
              <input type="text" id="localizacao" required />
            </div>

            <div class="form-group">
              <label for="area">Área *</label>
              <select id="area" required>
                <option value="">Selecione</option>
                <option value="administrativo">Administrativo</option>
                <option value="comercial">Comercial</option>
                <option value="operacional">Operacional</option>
                <option value="tecnologia">Tecnologia</option>
                <option value="atendimento">Atendimento</option>
                <option value="logistica">Logística</option>
                <option value="outros">Outros</option>
              </select>
            </div>

            <div class="form-group">
              <label for="tipo_contrato">Tipo de contrato</label>
              <input type="text" id="tipo_contrato" placeholder="CLT, PJ, estágio..." />
            </div>

            <div class="form-group">
              <label for="modelo_trabalho">Modelo de trabalho *</label>
              <select id="modelo_trabalho" required>
                <option value="">Selecione</option>
                <option value="presencial">Presencial</option>
                <option value="remoto">Remoto</option>
                <option value="hibrido">Híbrido</option>
              </select>
            </div>

            <div class="form-group">
              <label for="salario">Salário</label>
              <input type="text" id="salario" placeholder="Ex: R$ 2.000,00" />
            </div>

            <div class="form-group">
              <label for="link_inscricao">Link de inscrição *</label>
              <input type="url" id="link_inscricao" required />
            </div>
          </div>

          <div class="form-group">
            <label for="resumo">Resumo curto *</label>
            <textarea id="resumo" required></textarea>
          </div>

          <div class="form-group">
            <label for="descricao">Descrição completa *</label>
            <textarea id="descricao" required></textarea>
          </div>

          <div class="form-group">
            <label for="requisitos">Requisitos</label>
            <textarea id="requisitos"></textarea>
          </div>

          <div class="form-group">
            <label for="beneficios">Benefícios</label>
            <textarea id="beneficios"></textarea>
          </div>

          <div class="form-group">
            <label for="horario">Horário de trabalho</label>
            <input type="text" id="horario" />
          </div>

          <label class="checkbox-line">
            <input type="checkbox" id="ativa" checked />
            Vaga ativa
          </label>

          <button type="submit" class="btn btn-primary">Salvar vaga</button>
          <p id="adminMessage" class="form-message"></p>
        </form>
      </section>

      <section class="jobs-admin-list">
        <h2>Vagas cadastradas</h2>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Vaga</th>
                <th>Localização</th>
                <th>Modelo</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="adminJobsList"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
